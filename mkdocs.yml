site_name: Today I Learned
site_description: LLM-powered personal knowledge base
docs_dir: wiki

theme:
  name: material
  language: ja
  palette:
    scheme: slate
    primary: teal
    accent: teal
  features:
    - navigation.tabs
    - navigation.instant

plugins:
  - search
  - ezlinks
  - callouts
  - tags

hooks:
  - mkdocs_hooks/public_filter.py

markdown_extensions:
  - nl2br
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist
